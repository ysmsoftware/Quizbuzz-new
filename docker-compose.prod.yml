
x-backend-env: &backend-env
  env_file:
    - ./backend/.env.production

services:

  # ── Postgres ──
  postgres:
    image: postgres:16-alpine
    container_name: quizbuzz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: quizbuzz_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    image: ghcr.io/ysmsoftware/quizbuzz-backend:7adb866   # ← pulled from GHCR
    container_name: quizbuzz_backend
    restart: unless-stopped
    <<: *backend-env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3005:3005"
    volumes:
      - uploads:/app/storage
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Background Worker ──
  worker:
    image: ghcr.io/ysmsoftware/quizbuzz-backend:7adb866   # ← same image, different CMD
    container_name: quizbuzz_worker
    restart: unless-stopped
    <<: *backend-env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["node", "dist/worker.js"]
    volumes:
      - uploads:/app/storage
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend ──
  frontend:
    image: ghcr.io/ysmsoftware/quizbuzz-frontend:7adb866  # ← pulled from GHCR
    container_name: quizbuzz_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - external

 # ── Redis Exporter ──
  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: quizbuzz_redis_exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - internal

 # ── cAdvisor ──
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: quizbuzz_cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal

  # ── PostgreSQL Exporter ──
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: quizbuzz_postgres_exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=${DATA_SOURCE_NAME}
    networks:
      - internal

  # ── Node Exporter ──
  node_exporter:
    image: prom/node-exporter:latest
    container_name: quizbuzz_node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - internal

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:latest
    container_name: quizbuzz_prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - internal

  # ── Grafana ──
  grafana:
    image: grafana/grafana:latest
    container_name: quizbuzz_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3001
    ports:
      - "127.0.0.1:3002:3001"
    networks:
      - internal
# ─── Volumes ──
volumes:
  redis-data:
  uploads:
  pg-data:
  prometheus_data:
  grafana_data:
# ─── Networks ──
networks:
  internal:
    driver: bridge
  external:
    driver: bridge
