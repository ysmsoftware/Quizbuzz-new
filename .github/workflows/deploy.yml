name: Build, Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
      - "prisma/**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/quizbuzz

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # LINT & TEST
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test

      - name: Setup Node (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate Frontend Build
        working-directory: frontend
        run: npm run build

      - name: Notify Slack — Tests Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: *Tests/Lint failed* on `${{ github.ref_name }}` — deploy blocked.\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD BACKEND
  # ──────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD FRONTEND
  # ──────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_ENABLE_PWA=true
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # DEPLOY
  #
  # Strategy: write the deploy script to a temp file on the GitHub runner,
  # base64-encode it, send it to the EC2 via a single SSM command that
  # decodes and executes it. This avoids JSON-array quoting entirely.
  #
  # The script on EC2:
  #   1. Patches NODE_OPTIONS + HEALTH_HEAP_THRESHOLD_PCT into /app/.env
  #   2. Saves current tag as PREV_TAG for rollback
  #   3. Pulls new images from GHCR
  #   4. Updates /app/docker-compose.yml tags
  #   5. Restarts backend, worker, frontend (redis stays untouched)
  #   6. Health-checks /health for up to 90s
  #   7. On failure: rolls back to PREV_TAG and dumps backend logs
  #   8. On success: promotes :latest tag, prunes old SHA images
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (SSM)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Notify Slack — Deploy Started
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *Deploy started* for `${{ github.ref_name }}`\n*By:* ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Set image tag
        run: |
          SHORT_TAG="${{ github.sha }}"
          SHORT_TAG="${SHORT_TAG:0:7}"
          echo "IMAGE_TAG=$SHORT_TAG" >> $GITHUB_ENV
          echo "Deploying image tag: $SHORT_TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Store image tag in SSM
        run: |
          aws ssm put-parameter \
            --name "/quizbuzz/prod/image-tag" \
            --value "${{ env.IMAGE_TAG }}" \
            --type String \
            --overwrite \
            --region ap-south-1

      - name: Find admin EC2 instance ID
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=quizbuzz-admin" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ap-south-1)
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "ERROR: No running EC2 found with tag Name=quizbuzz-admin"
            exit 1
          fi
          echo "Found instance: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      # Write the deploy script to a temp file, encode it, send via SSM.
      # The EC2 decodes it to /tmp/deploy-ec2.sh and executes it.
      # Using a heredoc here means no quoting issues — bash reads it literally.
      - name: Build and send deploy script via SSM
        env:
          NEW_TAG: ${{ env.IMAGE_TAG }}
        run: |
          # Write the deploy script (no quoting issues — plain heredoc)
          cat > /tmp/deploy-ec2.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -euo pipefail
          exec > >(tee /tmp/deploy-ec2.log) 2>&1

          COMPOSE_FILE="/app/docker-compose.yml"
          REGISTRY="ghcr.io/ysmsoftware"

          echo "=== QuizBuzz Deploy ==="
          echo "Time    : $(date)"
          echo "New tag : $NEW_TAG"
          echo ""

          # 1. Patch .env — ensure NODE_OPTIONS and heap threshold are set correctly
          #    Runs on every deploy so even old instances that booted before these
          #    vars existed get them applied automatically.
          grep -q '^NODE_OPTIONS=' /app/.env \
            && sed -i 's|^NODE_OPTIONS=.*|NODE_OPTIONS=--max-old-space-size=1536|' /app/.env \
            || echo 'NODE_OPTIONS=--max-old-space-size=1536' >> /app/.env
          grep -q '^HEALTH_HEAP_THRESHOLD_PCT=' /app/.env \
            && sed -i 's|^HEALTH_HEAP_THRESHOLD_PCT=.*|HEALTH_HEAP_THRESHOLD_PCT=80|' /app/.env \
            || echo 'HEALTH_HEAP_THRESHOLD_PCT=80' >> /app/.env
          echo "NODE_OPTIONS   : $(grep NODE_OPTIONS /app/.env)"
          echo "Heap threshold : $(grep HEALTH_HEAP_THRESHOLD_PCT /app/.env)"
          echo ""

          # 2. Save previous tag for rollback
          PREV_TAG=$(grep -oP "quizbuzz-backend:\K[^\s'\"]*" "$COMPOSE_FILE" | head -1 || echo "latest")
          echo "Previous tag : $PREV_TAG"
          echo ""

          # 3. Login to GHCR
          GHCR_TOKEN=$(aws ssm get-parameter \
            --name /quizbuzz/prod/GHCR_TOKEN \
            --with-decryption \
            --query Parameter.Value \
            --output text \
            --region ap-south-1)
          echo "$GHCR_TOKEN" | docker login ghcr.io -u ysmsoftware --password-stdin

          # 4. Pull new images
          docker pull "$REGISTRY/quizbuzz-backend:$NEW_TAG"
          docker pull "$REGISTRY/quizbuzz-frontend:$NEW_TAG"
          echo ""

          # 5. Update compose file
          sed -i "s|quizbuzz-backend:[^ '\"]*|quizbuzz-backend:$NEW_TAG|g" "$COMPOSE_FILE"
          sed -i "s|quizbuzz-frontend:[^ '\"]*|quizbuzz-frontend:$NEW_TAG|g" "$COMPOSE_FILE"
          echo "Compose updated to $NEW_TAG"
          echo ""

          # 6. Restart services (redis untouched)
          docker compose -f "$COMPOSE_FILE" up -d --no-deps --force-recreate backend worker frontend

          # 7. Health check — up to 90s
          #    /health now uses v8.getHeapStatistics().heap_size_limit as denominator
          #    so heapUsedPct is relative to the 1.5GB cap, not the tiny startup arena.
          #    A status=OK (HTTP 200) is the only acceptance criterion.
          echo "Waiting for health (up to 90s)..."
          HEALTHY=false
          for i in $(seq 1 18); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3005/health 2>/dev/null || echo "000")
            BODY=$(curl -s http://localhost:3005/health 2>/dev/null || echo '{}')
            STATUS_VAL=$(echo "$BODY" | grep -oP '"status":"\K[^"]+' || echo "")
            HEAP_PCT=$(echo "$BODY"  | grep -oP '"heapUsedPct":\K[0-9]+' || echo "?")
            WS=$(echo "$BODY"        | grep -oP '"wsConnections":\K[0-9]+' || echo "0")
            echo "  [$i/18] HTTP $HTTP_CODE | status=$STATUS_VAL | heap=${HEAP_PCT}% | ws=$WS"
            if [ "$HTTP_CODE" = "200" ]; then
              HEALTHY=true
              break
            fi
            sleep 5
          done

          # 8. Rollback on failure
          if [ "$HEALTHY" = "false" ]; then
            echo ""
            echo "=== HEALTH CHECK FAILED — rolling back to $PREV_TAG ==="
            echo "--- Last 60 lines of backend logs ---"
            docker logs quizbuzz_backend --tail 60 || true
            echo "---"
            sed -i "s|quizbuzz-backend:$NEW_TAG|quizbuzz-backend:$PREV_TAG|g" "$COMPOSE_FILE"
            sed -i "s|quizbuzz-frontend:$NEW_TAG|quizbuzz-frontend:$PREV_TAG|g" "$COMPOSE_FILE"
            docker compose -f "$COMPOSE_FILE" up -d --no-deps --force-recreate backend worker frontend
            echo "Rollback complete — running $PREV_TAG"
            exit 1
          fi

          echo ""
          echo "=== Healthy on $NEW_TAG ==="

          # 9. Promote :latest (rollback target for next deploy)
          docker tag "$REGISTRY/quizbuzz-backend:$NEW_TAG"  "$REGISTRY/quizbuzz-backend:latest"
          docker tag "$REGISTRY/quizbuzz-frontend:$NEW_TAG" "$REGISTRY/quizbuzz-frontend:latest"

          # 10. Prune old images — keep only current tag and :latest
          docker image prune -f
          docker images "$REGISTRY/quizbuzz-backend"  --format '{{.Tag}} {{.ID}}' \
            | grep -vE "^(${NEW_TAG}|latest) " | awk '{print $2}' | sort -u \
            | xargs -r docker rmi -f || true
          docker images "$REGISTRY/quizbuzz-frontend" --format '{{.Tag}} {{.ID}}' \
            | grep -vE "^(${NEW_TAG}|latest) " | awk '{print $2}' | sort -u \
            | xargs -r docker rmi -f || true

          echo "Disk after prune: $(df -h / | tail -1)"
          echo ""
          echo "=== Deploy complete: $(date) ==="
          docker compose -f "$COMPOSE_FILE" ps
          DEPLOY_SCRIPT

          # Base64-encode (no line wraps) and send to EC2 via SSM
          SCRIPT_B64=$(base64 -w0 < /tmp/deploy-ec2.sh)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.IMAGE_TAG }} by ${{ github.actor }}" \
            --parameters "commands=[
              \"echo '$SCRIPT_B64' | base64 -d > /tmp/deploy-ec2.sh\",
              \"NEW_TAG=${{ env.IMAGE_TAG }} bash /tmp/deploy-ec2.sh\"
            ]" \
            --timeout-seconds 360 \
            --query "Command.CommandId" \
            --output text \
            --region ap-south-1)

          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for deploy to complete
        run: |
          echo "Waiting for SSM command ${{ env.COMMAND_ID }} ..."
          for i in $(seq 1 72); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ env.COMMAND_ID }}" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --query "Status" \
              --output text \
              --region ap-south-1 2>/dev/null || echo "Pending")
            echo "  Attempt $i/72 — Status: $STATUS"
            case "$STATUS" in
              "Success")
                echo "Deploy succeeded."
                aws ssm get-command-invocation \
                  --command-id "${{ env.COMMAND_ID }}" \
                  --instance-id "${{ env.INSTANCE_ID }}" \
                  --query "StandardOutputContent" \
                  --output text \
                  --region ap-south-1 || true
                exit 0
                ;;
              "Failed"|"Cancelled"|"TimedOut")
                echo "Deploy failed with status: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "${{ env.COMMAND_ID }}" \
                  --instance-id "${{ env.INSTANCE_ID }}" \
                  --query "StandardOutputContent" \
                  --output text \
                  --region ap-south-1 || true
                aws ssm get-command-invocation \
                  --command-id "${{ env.COMMAND_ID }}" \
                  --instance-id "${{ env.INSTANCE_ID }}" \
                  --query "StandardErrorContent" \
                  --output text \
                  --region ap-south-1 || true
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done
          echo "Timed out waiting for SSM command after 6 minutes."
          exit 1

      - name: Notify Slack — Deploy Succeeded
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Deploy succeeded!* `ysmquizbuzz.com` is live.\n*Tag:* `${{ env.IMAGE_TAG }}`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — Deploy Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":fire: *Deploy FAILED!* `ysmquizbuzz.com`\n*Tag:* `${{ env.IMAGE_TAG }}`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

