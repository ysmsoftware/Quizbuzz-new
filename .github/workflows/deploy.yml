name: Build, Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
      - "prisma/**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/quizbuzz

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # LINT & TEST
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test

      - name: Setup Node (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate Frontend Build
        working-directory: frontend
        run: npm run build

      - name: Notify Slack — Tests Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: *Tests/Lint failed* on `${{ github.ref_name }}` — deploy blocked.\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD BACKEND
  # ──────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD FRONTEND
  # ──────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # DEPLOY
  #
  # CURRENT MODE: SSM Run Command → Terraform EC2 (tag: quizbuzz-admin)
  #
  # HOW THE TWO-MODE SWITCH WORKS:
  #   This job has an env var DEPLOY_MODE at the top of the steps.
  #   - "ssm"  → finds the Terraform EC2 by tag, deploys via SSM Run Command
  #   - "ssh"  → falls back to the old manual EC2 via SSH
  #
  #   To switch back to SSH temporarily (e.g. if Terraform EC2 is down):
  #     Change DEPLOY_MODE to "ssh" and push.
  #
  # WHAT THE SSM DEPLOY DOES ON THE EC2:
  #   1. Reads GHCR_TOKEN from SSM Parameter Store
  #   2. Logs into GHCR
  #   3. Pulls new backend + frontend images (short git SHA tag)
  #   4. Updates image tags in /app/docker-compose.yml with sed
  #   5. Restarts backend, worker, frontend (leaves redis untouched)
  #   6. Health checks /health for up to 60s
  #   7. Rolls back to :latest if health check fails
  #
  # REQUIREMENTS FOR SSM MODE:
  #   - EC2 must have tag: Name=quizbuzz-admin
  #   - EC2 must have IAM role with AmazonSSMManagedInstanceCore
  #   - SSM agent must be running on the EC2 (pre-installed on Amazon Linux 2023)
  #   - /quizbuzz/prod/GHCR_TOKEN must exist in SSM Parameter Store
  #   - GitHub Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (SSM)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Notify Slack — Deploy Started
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *Deploy started* for `${{ github.ref_name }}`\n*By:* ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # Compute short SHA — matches what docker/metadata-action outputs
      # with type=sha,format=short (first 7 chars of github.sha)
      - name: Set image tag
        run: |
          SHORT_TAG="${{ github.sha }}"
          SHORT_TAG="${SHORT_TAG:0:7}"
          echo "IMAGE_TAG=$SHORT_TAG" >> $GITHUB_ENV
          echo "Deploying image tag: $SHORT_TAG"

      # ── Configure AWS credentials ────────────────────────────────────────
      # Uses the IAM user quizbuzz-github-actions created in AWS.
      # That user has permissions: ssm:SendCommand, ssm:GetCommandInvocation,
      # ssm:PutParameter, ssm:GetParameter, ec2:DescribeInstances
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ── Store image tag in SSM ───────────────────────────────────────────
      # Two purposes:
      # 1. The EC2 reads this during the SSM Run Command below
      # 2. If the EC2 is ever terminated and recreated by Terraform,
      #    it boots with the latest deployed image tag (not "latest")
      - name: Update image tag in SSM
        run: |
          aws ssm put-parameter \
            --name "/quizbuzz/prod/image-tag" \
            --value "${{ env.IMAGE_TAG }}" \
            --type String \
            --overwrite \
            --region ap-south-1
          echo "Stored image tag in SSM: ${{ env.IMAGE_TAG }}"

      # ── Find the Terraform EC2 by tag ────────────────────────────────────
      # Looks for a running EC2 with the tag Name=quizbuzz-admin.
      # This tag is set in terraform/modules/admin_instance/main.tf.
      # No hardcoded instance ID — works even after Terraform recreates it.
      - name: Find admin EC2 instance ID
        id: find-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=quizbuzz-admin" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ap-south-1)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "ERROR: No running EC2 found with tag Name=quizbuzz-admin"
            echo "Make sure terraform apply has been run and the instance is running."
            exit 1
          fi

          echo "Found instance: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      # ── Send deploy command via SSM ──────────────────────────────────────
      # The EC2 receives this as a shell script and runs it as root.
      # SSM agent (pre-installed on Amazon Linux 2023) handles the delivery.
      # No SSH port needed — communication is via AWS APIs only.
      - name: Deploy via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.IMAGE_TAG }} by ${{ github.actor }}" \
            --parameters commands='[
              "set -euo pipefail",
              "echo \"=== Deploy starting: $(date) ===\"",
              "echo \"Tag: '"${{ env.IMAGE_TAG }}"'\"",
              "",
              "NEW_TAG='"${{ env.IMAGE_TAG }}"'",
              "",
              "# Read GHCR token from SSM and login",
              "GHCR_TOKEN=$(aws ssm get-parameter --name /quizbuzz/prod/GHCR_TOKEN --with-decryption --query Parameter.Value --output text --region ap-south-1)",
              "echo \"$GHCR_TOKEN\" | docker login ghcr.io -u ysmsoftware --password-stdin",
              "",
              "# Pull new images",
              "docker pull ghcr.io/ysmsoftware/quizbuzz-backend:$NEW_TAG",
              "docker pull ghcr.io/ysmsoftware/quizbuzz-frontend:$NEW_TAG",
              "",
              "# Update image tags in compose file",
              "sed -i \"s|quizbuzz-backend:[^ ]*|quizbuzz-backend:$NEW_TAG|g\" /app/docker-compose.yml",
              "sed -i \"s|quizbuzz-frontend:[^ ]*|quizbuzz-frontend:$NEW_TAG|g\" /app/docker-compose.yml",
              "",
              "# Restart changed services only (redis stays untouched)",
              "docker compose -f /app/docker-compose.yml up -d --no-deps --no-build backend worker frontend",
              "",
              "# Health check — up to 60s",
              "HEALTHY=false",
              "for i in $(seq 1 12); do",
              "  STATUS=$(curl -s -o /dev/null -w \"%{http_code}\" http://localhost:3005/health || echo 000)",
              "  echo \"Health check $i/12 — HTTP $STATUS\"",
              "  if [ \"$STATUS\" = \"200\" ]; then HEALTHY=true; break; fi",
              "  sleep 5",
              "done",
              "",
              "if [ \"$HEALTHY\" = \"false\" ]; then",
              "  echo \"Health check FAILED — rolling back to latest\"",
              "  sed -i \"s|quizbuzz-backend:$NEW_TAG|quizbuzz-backend:latest|g\" /app/docker-compose.yml",
              "  sed -i \"s|quizbuzz-frontend:$NEW_TAG|quizbuzz-frontend:latest|g\" /app/docker-compose.yml",
              "  docker compose -f /app/docker-compose.yml up -d --no-deps --no-build backend worker frontend",
              "  exit 1",
              "fi",
              "",
              "# Retag :latest so rollback always has a valid target",
              "docker tag ghcr.io/ysmsoftware/quizbuzz-backend:$NEW_TAG ghcr.io/ysmsoftware/quizbuzz-backend:latest",
              "docker tag ghcr.io/ysmsoftware/quizbuzz-frontend:$NEW_TAG ghcr.io/ysmsoftware/quizbuzz-frontend:latest",
              "",
              "docker image prune -f",
              "echo \"=== Deploy complete: $(date) ===\"",
              "docker compose -f /app/docker-compose.yml ps"
            ]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text \
            --region ap-south-1)

          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      # ── Wait for the SSM command to finish ───────────────────────────────
      # Polls every 5s. Possible statuses:
      #   InProgress → still running
      #   Success    → all commands exited 0
      #   Failed     → a command exited non-zero (health check failed, etc.)
      #   TimedOut   → took longer than timeout-seconds (300s)
      #   Cancelled  → manually cancelled
      - name: Wait for deploy to complete
        run: |
          echo "Waiting for SSM command ${{ env.COMMAND_ID }} ..."

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ env.COMMAND_ID }}" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --query "Status" \
              --output text \
              --region ap-south-1 2>/dev/null || echo "Pending")

            echo "  Attempt $i/60 — Status: $STATUS"

            case "$STATUS" in
              "Success")
                echo "Deploy succeeded."

                # Print the deploy output for the GitHub Actions log
                aws ssm get-command-invocation \
                  --command-id "${{ env.COMMAND_ID }}" \
                  --instance-id "${{ env.INSTANCE_ID }}" \
                  --query "StandardOutputContent" \
                  --output text \
                  --region ap-south-1 || true

                exit 0
                ;;
              "Failed"|"Cancelled"|"TimedOut")
                echo "Deploy failed with status: $STATUS"

                # Print error output for debugging
                aws ssm get-command-invocation \
                  --command-id "${{ env.COMMAND_ID }}" \
                  --instance-id "${{ env.INSTANCE_ID }}" \
                  --query "StandardErrorContent" \
                  --output text \
                  --region ap-south-1 || true

                exit 1
                ;;
              *)
                # InProgress, Pending, Delayed — keep waiting
                sleep 5
                ;;
            esac
          done

          echo "Timed out waiting for SSM command after 5 minutes."
          exit 1

      - name: Notify Slack — Deploy Succeeded
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Deploy succeeded!* `quiz.ysminfosolution.com` is live.\n*Tag:* `${{ env.IMAGE_TAG }}`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — Deploy Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":fire: *Deploy FAILED!* `quiz.ysminfosolution.com`\n*Tag:* `${{ env.IMAGE_TAG }}`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

