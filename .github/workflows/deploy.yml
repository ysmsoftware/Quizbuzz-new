name: Build, Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
      - "prisma/**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/quizbuzz

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # LINT & TEST
  # Unchanged from your current pipeline.
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test

      - name: Setup Node (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate Frontend Build
        working-directory: frontend
        run: npm run build

      - name: Notify Slack — Tests Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: *Tests/Lint failed* on `${{ github.ref_name }}` — deploy blocked.\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD BACKEND
  # Unchanged from your current pipeline.
  # Pushes to GHCR with two tags: git SHA (e.g. "a3f8c2d") and "latest".
  # ──────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD FRONTEND
  # Unchanged from your current pipeline.
  # ──────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # DEPLOY
  #
  # WHAT CHANGED FROM YOUR OLD DEPLOY JOB:
  # Old: SSH into EC2 → git pull → write .env files → docker compose up
  # New: AWS SSM Run Command → EC2 pulls new images from GHCR → restart containers
  #
  # WHY THE CHANGE?
  # The new EC2 (created by Terraform) does NOT have the git repo cloned.
  # All config comes from /app/.env written at boot (from SSM).
  # On every deploy we only need to: pull new images + restart services.
  # SSM Run Command lets us do this without SSH or storing EC2_SSH_KEY in GitHub.
  #
  # WHAT YOU NEED IN GITHUB SECRETS FOR THIS JOB:
  #   AWS_ACCESS_KEY_ID      — IAM user key for Terraform/CI (already in GitHub)
  #   AWS_SECRET_ACCESS_KEY  — IAM user secret (already in GitHub)
  #   AWS_ACCOUNT_ID         — your 12-digit AWS account ID (add this)
  #
  # HOW IT FINDS THE EC2:
  # It searches for an EC2 with tag Name=quizbuzz-admin (set in Terraform).
  # No hardcoded instance ID — works even if the instance is replaced.
  #
  # HOW ROLLBACK WORKS:
  # SSM Run Command returns exit code 0 (success) or 1 (failure).
  # If the health check after restart fails, we re-pull the "latest" tag
  # (which still points to the previous image until the next successful build)
  # and restart again. This is the same rollback logic as your old deploy.
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (SSM)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Notify Slack — Deploy Started
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *Deploy started* for `${{ github.ref_name }}`\n*By:* ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # Configure AWS CLI with the IAM credentials stored in GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # Step 1: Write the new git SHA as the image tag in SSM.
      # The running EC2 doesn't read this at deploy time — the SSM Run Command
      # below reads it explicitly. But it's stored here so if the EC2 is ever
      # terminated and recreated, it boots with the latest image.
      - name: Update image tag in SSM
        run: |
          IMAGE_TAG="${{ github.sha }}"
          # github.sha is the full 40-char SHA. We use the short version (7 chars)
          # which matches what docker/metadata-action outputs with format=short.
          SHORT_TAG="${IMAGE_TAG:0:7}"
          
          aws ssm put-parameter \
            --name "/quizbuzz/prod/image-tag" \
            --value "$SHORT_TAG" \
            --type String \
            --overwrite \
            --region ap-south-1
          
          echo "IMAGE_TAG=$SHORT_TAG" >> $GITHUB_ENV
          echo "Stored image tag: $SHORT_TAG"

      # Step 2: Find the admin EC2 instance by its Terraform-managed tag.
      # This avoids hardcoding the instance ID in GitHub Secrets.
      - name: Find admin EC2 instance ID
        id: find-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=quizbuzz-admin" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ap-south-1)
          
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "ERROR: No running instance found with tag Name=quizbuzz-admin"
            exit 1
          fi
          
          echo "Found instance: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      # Step 3: Send the deploy command to the EC2 via SSM Run Command.
      #
      # The command does:
      #   1. Log in to GHCR (using the GHCR_TOKEN from SSM)
      #   2. Pull the new image tag (the git SHA from the build above)
      #   3. Update the image tags in /app/docker-compose.yml with sed
      #   4. Restart only the changed services (--no-deps prevents
      #      restarting redis unnecessarily)
      #   5. Health check — wait up to 60s for /health to return 200
      #   6. If health check fails: roll back by pulling "latest" tag
      #
      # IMPORTANT: The SSM Run Command runs as root on the EC2.
      # docker compose is available at /usr/local/lib/docker/cli-plugins/docker-compose
      - name: Deploy via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -euo pipefail",
              "echo \"=== Deploy starting: $(date) ===\"",
              "",
              "# Read GHCR token from SSM and login",
              "GHCR_TOKEN=$(aws ssm get-parameter --name /quizbuzz/prod/GHCR_TOKEN --with-decryption --query Parameter.Value --output text --region ap-south-1)",
              "echo \"$GHCR_TOKEN\" | docker login ghcr.io -u ysmsoftware --password-stdin",
              "",
              "# Pull new backend and frontend images (new git SHA tag)",
              "NEW_TAG=${{ env.IMAGE_TAG }}",
              "echo \"Pulling images with tag: $NEW_TAG\"",
              "docker pull ghcr.io/ysmsoftware/quizbuzz-backend:$NEW_TAG",
              "docker pull ghcr.io/ysmsoftware/quizbuzz-frontend:$NEW_TAG",
              "",
              "# Update image tags in the compose file",
              "sed -i \"s|quizbuzz-backend:.*|quizbuzz-backend:$NEW_TAG|g\" /app/docker-compose.yml",
              "sed -i \"s|quizbuzz-frontend:.*|quizbuzz-frontend:$NEW_TAG|g\" /app/docker-compose.yml",
              "",
              "# Restart backend, worker, frontend (not redis — no changes there)",
              "docker compose -f /app/docker-compose.yml up -d --no-deps --no-build backend worker frontend",
              "",
              "# Health check — up to 60s (12 attempts x 5s)",
              "echo \"Waiting for health check...\"",
              "HEALTHY=false",
              "for i in $(seq 1 12); do",
              "  STATUS=$(curl -s -o /dev/null -w \"%{http_code}\" http://localhost:3005/health || echo 000)",
              "  echo \"Attempt $i/12 — HTTP $STATUS\"",
              "  if [ \"$STATUS\" = \"200\" ]; then HEALTHY=true; break; fi",
              "  sleep 5",
              "done",
              "",
              "if [ \"$HEALTHY\" = \"false\" ]; then",
              "  echo \"Health check FAILED — rolling back to latest\"",
              "  sed -i \"s|quizbuzz-backend:$NEW_TAG|quizbuzz-backend:latest|g\" /app/docker-compose.yml",
              "  sed -i \"s|quizbuzz-frontend:$NEW_TAG|quizbuzz-frontend:latest|g\" /app/docker-compose.yml",
              "  docker compose -f /app/docker-compose.yml up -d --no-deps --no-build backend worker frontend",
              "  echo \"Rollback complete\"",
              "  exit 1",
              "fi",
              "",
              "# Retag latest to this new image (so rollback always has a valid target)",
              "docker tag ghcr.io/ysmsoftware/quizbuzz-backend:$NEW_TAG ghcr.io/ysmsoftware/quizbuzz-backend:latest",
              "docker tag ghcr.io/ysmsoftware/quizbuzz-frontend:$NEW_TAG ghcr.io/ysmsoftware/quizbuzz-frontend:latest",
              "",
              "# Clean up old images to free disk space",
              "docker image prune -f",
              "",
              "echo \"=== Deploy complete: $(date) ===\""
            ]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text \
            --region ap-south-1)
          
          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      # Step 4: Wait for the SSM command to finish (poll every 5s, max 5 min)
      - name: Wait for deploy to complete
        run: |
          echo "Waiting for SSM command $COMMAND_ID to complete..."
          
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text \
              --region ap-south-1 2>/dev/null || echo "Pending")
            
            echo "  Attempt $i/60 — Status: $STATUS"
            
            case "$STATUS" in
              "Success")
                echo "Deploy succeeded."
                exit 0
                ;;
              "Failed"|"Cancelled"|"TimedOut")
                # Print the error output from the EC2 for debugging
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" \
                  --output text \
                  --region ap-south-1 || true
                echo "Deploy failed with status: $STATUS"
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done
          
          echo "Timed out waiting for SSM command."
          exit 1

      - name: Notify Slack — Deploy Succeeded
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Deploy succeeded!* `quiz.ysminfosolution.com` is live.\n*Tag:* `${{ env.IMAGE_TAG }}`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — Deploy Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":fire: *Deploy FAILED!* `quiz.ysminfosolution.com`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
