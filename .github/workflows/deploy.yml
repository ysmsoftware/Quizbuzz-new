name: Build, Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
      - ".github/deploy-ec2.sh"
      - "prisma/**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/quizbuzz

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # LINT & TEST
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test

      - name: Setup Node (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate Frontend Build
        working-directory: frontend
        run: npm run build

      - name: Notify Slack — Tests Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: *Tests/Lint failed* on `${{ github.ref_name }}` — deploy blocked.\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD BACKEND
  # ──────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD FRONTEND
  # ──────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # DEPLOY
  #
  # The deploy script (.github/deploy-ec2.sh) is base64-encoded here and
  # sent to the EC2 via SSM Run Command. This avoids all JSON-array quoting
  # issues and makes the deploy logic easy to read and test independently.
  #
  # What the script does on EC2:
  #   1. Patches NODE_OPTIONS + HEALTH_HEAP_THRESHOLD_PCT in /app/.env
  #   2. Saves the current image tag as PREV_TAG for rollback
  #   3. Logs into GHCR, pulls new images
  #   4. Updates /app/docker-compose.yml to the new tag
  #   5. Restarts backend, worker, frontend (redis untouched)
  #   6. Health-checks /health for up to 90s with startup-GC tolerance
  #   7. On failure: rolls back to PREV_TAG, dumps logs, exits 1
  #   8. On success: promotes :latest, prunes old SHA-tagged images
  #
  # Requirements:
  #   EC2 tag Name=quizbuzz-admin, SSM agent running, IAM role with SSM + ECR
  #   GitHub Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  #   SSM params: /quizbuzz/prod/GHCR_TOKEN
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (SSM)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Notify Slack — Deploy Started
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *Deploy started* for `${{ github.ref_name }}`\n*By:* ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Set image tag
        run: |
          SHORT_TAG="${{ github.sha }}"
          SHORT_TAG="${SHORT_TAG:0:7}"
          echo "IMAGE_TAG=$SHORT_TAG" >> $GITHUB_ENV
          echo "Deploying image tag: $SHORT_TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Store image tag in SSM
        run: |
          aws ssm put-parameter \
            --name "/quizbuzz/prod/image-tag" \
            --value "${{ env.IMAGE_TAG }}" \
            --type String \
            --overwrite \
            --region ap-south-1
          echo "Stored image tag in SSM: ${{ env.IMAGE_TAG }}"

      - name: Find admin EC2 instance ID
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=quizbuzz-admin" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ap-south-1)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "ERROR: No running EC2 found with tag Name=quizbuzz-admin"
            exit 1
          fi

          echo "Found instance: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      # Encode the deploy script as base64 and send it via SSM.
      # On EC2: decode -> write to /tmp/deploy-ec2.sh -> execute with NEW_TAG env var.
      # This avoids all JSON-array quoting issues entirely.
      - name: Send deploy script via SSM
        run: |
          SCRIPT_B64=$(base64 -w0 < .github/deploy-ec2.sh)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.IMAGE_TAG }} by ${{ github.actor }}" \
            --parameters "commands=[
              \"echo '$SCRIPT_B64' | base64 -d > /tmp/deploy-ec2.sh\",
              \"chmod +x /tmp/deploy-ec2.sh\",
              \"NEW_TAG=${{ env.IMAGE_TAG }} APP_ENV_FILE=/app/.env bash /tmp/deploy-ec2.sh\"
            ]" \
            --timeout-seconds 360 \
            --query "Command.CommandId" \
            --output text \
            --region ap-south-1)

          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for deploy to complete
        run: |
          echo "Waiting for SSM command ${{ env.COMMAND_ID }} ..."

          for i in $(seq 1 72); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ env.COMMAND_ID }}" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --query "Status" \
              --output text \
              --region ap-south-1 2>/dev/null || echo "Pending")

            echo "  Attempt $i/72 — Status: $STATUS"

            case "$STATUS" in
              "Success")
                echo "Deploy succeeded."
                aws ssm get-command-invocation \
                  --command-id "${{ env.COMMAND_ID }}" \
                  --instance-id "${{ env.INSTANCE_ID }}" \
                  --query "StandardOutputContent" \
                  --output text \
                  --region ap-south-1 || true
                exit 0
                ;;
              "Failed"|"Cancelled"|"TimedOut")
                echo "Deploy failed with status: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "${{ env.COMMAND_ID }}" \
                  --instance-id "${{ env.INSTANCE_ID }}" \
                  --query "StandardOutputContent" \
                  --output text \
                  --region ap-south-1 || true
                aws ssm get-command-invocation \
                  --command-id "${{ env.COMMAND_ID }}" \
                  --instance-id "${{ env.INSTANCE_ID }}" \
                  --query "StandardErrorContent" \
                  --output text \
                  --region ap-south-1 || true
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done

          echo "Timed out waiting for SSM command after 6 minutes."
          exit 1

      - name: Notify Slack — Deploy Succeeded
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Deploy succeeded!* `ysmquizbuzz.com` is live.\n*Tag:* `${{ env.IMAGE_TAG }}`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — Deploy Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":fire: *Deploy FAILED!* `ysmquizbuzz.com`\n*Tag:* `${{ env.IMAGE_TAG }}`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

