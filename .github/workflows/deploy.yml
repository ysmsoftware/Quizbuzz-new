name: Build, Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/quizbuzz

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint & Test (must pass before anything builds)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Setup Node (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Setup Node (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate Frontend Build
        working-directory: frontend
        run: npm run build

      # ── Notify Slack on test failure ──────────────────────────────────────
      - name: Notify Slack — Tests Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: *Tests/Lint failed* on `${{ github.ref_name }}` — deploy blocked.\n*Commit:* ${{ github.event.head_commit.message }}\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build backend image and push to GHCR
  # ─────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build frontend image and push to GHCR
  # ─────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — SSH into EC2, pull new images, restart containers
  # Runs only after BOTH builds succeed
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Notify Slack — Deploy Started
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *Deploy started* for `${{ github.ref_name }}`\n*Commit:* ${{ github.event.head_commit.message }}\n*By:* ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_PRODUCTION
          script: |
            set -e

            cd /home/ubuntu/quizbuzz

            # ── Save current image tags for rollback ──
            PREV_BACKEND=$(docker inspect --format='{{index .RepoTags 0}}' $(docker compose -f docker-compose.prod.yml ps -q backend) 2>/dev/null || echo "none")
            PREV_FRONTEND=$(docker inspect --format='{{index .RepoTags 0}}' $(docker compose -f docker-compose.prod.yml ps -q frontend) 2>/dev/null || echo "none")
            echo "Previous backend image: $PREV_BACKEND"
            echo "Previous frontend image: $PREV_FRONTEND"

            # ── Pull latest docker-compose file ──
            git pull origin main

            # ── Write env file from GitHub Secret ──
            echo "$ENV_PRODUCTION" > ./backend/.env.production
            cp ./backend/.env.production ./.env.production

            # ── Write root .env for docker-compose variable substitution ──
            cat > ./.env << 'ENVEOF'
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=postgres
            POSTGRES_DB=quizbuzz
            REDIS_PASSWORD=austin_redis_pass
            ENVEOF

            # ── Pull pre-built images ────────────
            docker compose -f docker-compose.prod.yml pull backend frontend

            # ── Zero-downtime rolling restart ────
            docker compose -f docker-compose.prod.yml up -d \
              --no-build \
              --remove-orphans

            # ── Health check (retry for 60s) ─────
            echo "Waiting for health check..."
            HEALTH_URL="https://quiz.ysminfosolution.com/health"
            MAX_RETRIES=12
            RETRY_INTERVAL=5
            HEALTHY=false

            for i in $(seq 1 $MAX_RETRIES); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
              echo "Attempt $i/$MAX_RETRIES — HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                HEALTHY=true
                break
              fi
              sleep $RETRY_INTERVAL
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "Health check FAILED — rolling back..."

              # ── Rollback to previous images ──────
              if [ "$PREV_BACKEND" != "none" ]; then
                docker compose -f docker-compose.prod.yml \
                  up -d --no-build backend || true
              fi
              if [ "$PREV_FRONTEND" != "none" ]; then
                docker compose -f docker-compose.prod.yml \
                  up -d --no-build backend || true
              fi

              echo "Rollback complete"
              exit 1
            fi

            # ── Prune dangling images ────────────
            docker image prune -f

            echo "Deploy complete — $(date)"
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}

      # ── Notify Slack — Success ──────────────────────────────────────────
      - name: Notify Slack — Deploy Succeeded
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Deploy succeeded!* `quiz.ysminfosolution.com` is live.\n*Commit:* ${{ github.event.head_commit.message }}\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # ── Notify Slack — Failure / Rollback ──────────────────────────────
      - name: Notify Slack — Deploy Failed (Rolled Back)
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":fire: *Deploy FAILED & rolled back!* `quiz.ysminfosolution.com`\n*Commit:* ${{ github.event.head_commit.message }}\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
 
