name: Build, Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
      - "prisma/**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/quizbuzz

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # LINT & TEST
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test

      - name: Setup Node (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate Frontend Build
        working-directory: frontend
        run: npm run build

      - name: Notify Slack — Tests Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: *Tests/Lint failed* on `${{ github.ref_name }}` — deploy blocked.\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD BACKEND
  # ──────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # BUILD FRONTEND
  # ──────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # DEPLOY — SSH to old manual EC2
  #
  # Uses EC2_HOST, EC2_USER, EC2_SSH_KEY secrets (already in your repo).
  # Compose file is at: /home/ubuntu/quizbuzz/docker-compose.prod.yml
  #
  # When we cut over to the Terraform EC2, this job gets replaced with
  # the SSM Run Command version (kept as a comment at the bottom).
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (SSH)
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Notify Slack — Deploy Started
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *Deploy started* for `${{ github.ref_name }}`\n*By:* ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # Compute short SHA — matches what docker/metadata-action outputs
      # with type=sha,format=short (first 7 chars of github.sha)
      - name: Set image tag
        run: |
          SHORT_TAG="${{ github.sha }}"
          SHORT_TAG="${SHORT_TAG:0:7}"
          echo "IMAGE_TAG=$SHORT_TAG" >> $GITHUB_ENV
          echo "Deploying image tag: $SHORT_TAG"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              NEW_TAG="${{ env.IMAGE_TAG }}" \
              bash -s << 'ENDSSH'
          set -euo pipefail
          echo "=== Deploy starting on $(hostname) at $(date) ==="
          echo "Image tag: $NEW_TAG"

          # Compose file location (confirmed from your server)
          COMPOSE_FILE="$HOME/quizbuzz/docker-compose.prod.yml"

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "ERROR: Compose file not found at $COMPOSE_FILE"
            exit 1
          fi
          echo "Using: $COMPOSE_FILE"

          # ── Pull new images ───────────────────────────────────────────────
          # GHCR credentials are cached on this server from previous deploys.
          # If this fails with "unauthorized", SSH in manually and run:
          #   docker login ghcr.io -u ysmsoftware
          echo "Pulling backend:$NEW_TAG ..."
          docker pull "ghcr.io/ysmsoftware/quizbuzz-backend:$NEW_TAG"

          echo "Pulling frontend:$NEW_TAG ..."
          docker pull "ghcr.io/ysmsoftware/quizbuzz-frontend:$NEW_TAG"

          # ── Update image tags in the compose file ─────────────────────────
          sed -i "s|quizbuzz-backend:[^ ]*|quizbuzz-backend:$NEW_TAG|g" "$COMPOSE_FILE"
          sed -i "s|quizbuzz-frontend:[^ ]*|quizbuzz-frontend:$NEW_TAG|g" "$COMPOSE_FILE"

          # ── Restart only changed services ─────────────────────────────────
          # --no-deps: don't touch redis, postgres, prometheus, grafana, etc.
          # --no-build: use the already-pulled image
          echo "Restarting backend, worker, frontend..."
          docker compose -f "$COMPOSE_FILE" up -d --no-deps --no-build backend worker frontend

          # ── Health check ─────────────────────────────────────────────────
          echo "Running health check (up to 60s)..."
          HEALTHY=false
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3005/health 2>/dev/null || echo "000")
            echo "  Attempt $i/12 — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              HEALTHY=true
              break
            fi
            sleep 5
          done

          if [ "$HEALTHY" = "false" ]; then
            echo "Health check FAILED — rolling back to latest"
            sed -i "s|quizbuzz-backend:$NEW_TAG|quizbuzz-backend:latest|g" "$COMPOSE_FILE"
            sed -i "s|quizbuzz-frontend:$NEW_TAG|quizbuzz-frontend:latest|g" "$COMPOSE_FILE"
            docker compose -f "$COMPOSE_FILE" up -d --no-deps --no-build backend worker frontend
            echo "Rollback complete"
            docker compose -f "$COMPOSE_FILE" ps
            exit 1
          fi

          # ── Retag :latest so rollback always has a valid target ───────────
          docker tag "ghcr.io/ysmsoftware/quizbuzz-backend:$NEW_TAG" \
                     "ghcr.io/ysmsoftware/quizbuzz-backend:latest"
          docker tag "ghcr.io/ysmsoftware/quizbuzz-frontend:$NEW_TAG" \
                     "ghcr.io/ysmsoftware/quizbuzz-frontend:latest"

          # ── Cleanup old images ────────────────────────────────────────────
          docker image prune -f

          echo "=== Deploy complete at $(date) ==="
          docker compose -f "$COMPOSE_FILE" ps
          ENDSSH

      - name: Notify Slack — Deploy Succeeded
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Deploy succeeded!* `quiz.ysminfosolution.com` is live.\n*Tag:* `${{ env.IMAGE_TAG }}`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — Deploy Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":fire: *Deploy FAILED!* `quiz.ysminfosolution.com`\n*Tag:* `${{ env.IMAGE_TAG }}`\n*By:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

